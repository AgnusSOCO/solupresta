<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <rect width="1200" height="630" fill="url(#gradient)" />
  
  <!-- Decorative elements -->
  <circle cx="1000" cy="100" r="300" fill="url(#orb1)" fill-opacity="0.1" />
  <circle cx="200" cy="500" r="250" fill="url(#orb2)" fill-opacity="0.1" />
  
  <!-- Logo and text container -->
  <g transform="translate(150, 150)">
    <!-- Logo -->
    <image href="/assets/images/logos/logo.png" width="200" height="80" />
    
    <!-- Main text -->
    <text x="0" y="150" fill="#1E0F4F" font-family="Montserrat" font-size="48" font-weight="700">
      Préstamos para Mejoras
    </text>
    <text x="0" y="210" fill="#1E0F4F" font-family="Montserrat" font-size="48" font-weight="700">
      del Hogar en México
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="280" fill="#666666" font-family="Inter" font-size="24">
      Hasta $500,000 MXN • Aprobación en 24 horas
    </text>
    
    <!-- Features -->
    <g transform="translate(0, 340)">
      <rect width="160" height="60" rx="12" fill="#00D1FF" fill-opacity="0.1" />
      <text x="80" y="35" fill="#00D1FF" font-family="Inter" font-size="18" text-anchor="middle">
        Proceso Simple
      </text>
      
      <rect x="180" width="160" height="60" rx="12" fill="#00D1FF" fill-opacity="0.1" />
      <text x="260" y="35" fill="#00D1FF" font-family="Inter" font-size="18" text-anchor="middle">
        100% Seguro
      </text>
      
      <rect x="360" width="160" height="60" rx="12" fill="#00D1FF" fill-opacity="0.1" />
      <text x="440" y="35" fill="#00D1FF" font-family="Inter" font-size="18" text-anchor="middle">
        Mejores Tasas
      </text>
    </g>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F8F9FA" />
    </linearGradient>
    
    <radialGradient id="orb1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00D1FF" />
      <stop offset="100%" stop-color="#1E0F4F" />
    </radialGradient>
    
    <radialGradient id="orb2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#1E0F4F" />
      <stop offset="100%" stop-color="#00D1FF" />
    </radialGradient>
  </defs>
</svg>
